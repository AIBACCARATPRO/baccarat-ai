    <script>
        const API_URL = 'https://tooltxverse.com/txverse/apigame/org/apibcr.php';
        const currentTable = '<?= $table ?>';
        let lastDataString = '';
        let isAnalyzing = false;

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const dragStart = (e) => {
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                pos3 = clientX; pos4 = clientY;
                document.onmouseup = dragEnd; document.ontouchend = dragEnd;
                document.onmousemove = dragMove; document.ontouchmove = dragMove;
            };
            const dragMove = (e) => {
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - clientX; pos2 = pos4 - clientY;
                pos3 = clientX; pos4 = clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
                el.style.right = 'auto';
            };
            const dragEnd = () => {
                document.onmouseup = null; document.ontouchend = null;
                document.onmousemove = null; document.ontouchmove = null;
            };
            el.onmousedown = dragStart; el.ontouchstart = dragStart;
        }

        async function fetchApi() {
            try {
                const res = await fetch(API_URL);
                const rawText = await res.text();
                let cleanText = rawText.trim();
                let startIdx = cleanText.indexOf('[');
                let endIdx = cleanText.lastIndexOf(']');
                if (startIdx !== -1 && endIdx !== -1) {
                    cleanText = cleanText.substring(startIdx, endIdx + 1);
                }
                const data = JSON.parse(cleanText);
                const dataArr = Array.isArray(data) ? data : [data];
                const tableData = dataArr.find(t => t.tableName === currentTable);
                if (tableData) {
                    const dataStr = JSON.stringify(tableData.percentCurrent || {}) + '_' + tableData.maintenance + '_' + tableData.shuffle;
                    if(dataStr !== lastDataString) {
                        lastDataString = dataStr;
                        showAnalysis(tableData);
                    }
                }
            } catch (e) {
                console.log("Fetch Error");
            }
        }

        function showAnalysis(data) {
            if(isAnalyzing) return;
            isAnalyzing = true;
            const rbP = document.getElementById('rb-prediction');
            if(rbP) {
                rbP.innerText = "ĐANG PHÂN TÍCH...";
                rbP.style.color = "#f59e0b";
            }

            setTimeout(() => {
                isAnalyzing = false;
                updateUI(data);
            }, 3000);
        }

        function updateUI(data) {
            if(isAnalyzing) return;
            const s = data.percentCurrent || {};
            const forecast = Math.round(s.Forecast || 0);
            let pText = "WAIT";
            let pColorHex = "#94a3b8";

            if (data.maintenance === 1) {
                pText = "BẢO TRÌ";
                pColorHex = "#ef4444";
            } else if (data.shuffle === 1) {
                pText = "TRÁO BÀI";
                pColorHex = "#f59e0b";
            } else if (s.Round === 'B') { 
                pText = "BANKER"; 
                pColorHex = "#ef4444"; 
            } else if (s.Round === 'P') { 
                pText = "PLAYER"; 
                pColorHex = "#3b82f6"; 
            }

            const rbP = document.getElementById('rb-prediction');
            if(rbP) {
                rbP.innerText = pText;
                rbP.style.color = pColorHex;
            }
            
            let actualRate = 0;
            if(s.Round === 'B') actualRate = Math.round(s.Banker || 0);
            else if(s.Round === 'P') actualRate = Math.round(s.Player || 0);
            else actualRate = forecast;
            
            const rbR = document.getElementById('rb-rate');
            if(rbR) {
                rbR.innerText = actualRate + "%";
            }
        }

        window.onload = () => {
            const rbEl = document.getElementById("draggable-rb");
            if(rbEl) makeDraggable(rbEl);
            fetchApi();
            setInterval(fetchApi, 2000);
        };
    </script>
